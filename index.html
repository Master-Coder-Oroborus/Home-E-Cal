<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home E-Cal | Premium Electricity Tracker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+Sinhala:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Full-Screen Premium Theme */
        :root {
            --bg-cream: #fdf6e9;
            --card-white: #ffffff;
            --primary-maroon: #7f1d1d; 
            --primary-light: #991b1b;
            --accent-gold: #d97706; 
            --text-dark: #27272a;
            --text-light: #fefce8;
            --danger-color: #ef4444;
            --danger-bg: #fef2f2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; min-height: 100vh;
            font-family: 'Poppins', 'Noto Sans Sinhala', sans-serif;
            background-color: var(--bg-cream); color: var(--text-dark);
            overflow-x: hidden; position: relative;
        }

        /* --- Subtle Background Floating Animations --- */
        .bg-animations { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .bg-anim-item {
            position: absolute; color: rgba(217, 119, 6, 0.06); 
            font-size: 80px; animation: floatUp 20s infinite linear; bottom: -120px;
        }
        .bg-anim-item:nth-child(1) { left: 15%; animation-duration: 25s; animation-delay: 0s; font-size: 150px; }
        .bg-anim-item:nth-child(2) { left: 35%; animation-duration: 18s; animation-delay: 5s; font-size: 90px; }
        .bg-anim-item:nth-child(3) { left: 60%; animation-duration: 28s; animation-delay: 2s; font-size: 120px; }
        .bg-anim-item:nth-child(4) { left: 80%; animation-duration: 22s; animation-delay: 8s; font-size: 80px; }
        .bg-anim-item:nth-child(5) { left: 5%; animation-duration: 30s; animation-delay: 12s; font-size: 100px; }
        
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        /* --- Views Container --- */
        .view-container { display: none; width: 100%; min-height: 100vh; flex-direction: column; position: relative; z-index: 2; }
        .view-container.active { display: flex; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Loading Overlay --- */
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(253, 246, 233, 0.95);
            z-index: 9999; display: none; justify-content: center; align-items: center; flex-direction: column;
        }

        /* --- Login Screen --- */
        .login-wrapper { display: flex; flex-direction: row; flex-grow: 1; width: 100%; }
        .login-left {
            flex: 1; background: linear-gradient(135deg, var(--primary-maroon), var(--primary-light)); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center;
            position: relative; overflow: hidden;
        }
        
        .cyber-core { position: relative; width: 220px; height: 220px; margin-bottom: 40px; display: flex; justify-content: center; align-items: center; }
        .core-center { width: 60px; height: 60px; background: var(--accent-gold); border-radius: 50%; box-shadow: 0 0 20px var(--accent-gold), 0 0 40px rgba(255,255,255,0.5), inset 0 0 10px #fff; animation: corePulse 1.5s infinite alternate; z-index: 10; }
        .orbit-ring { position: absolute; border-radius: 50%; animation: spinRing linear infinite; }
        .orbit-ring.r1 { width: 110px; height: 110px; border: 3px dashed rgba(255, 255, 255, 0.6); animation-duration: 6s; }
        .orbit-ring.r2 { width: 160px; height: 160px; border: 2px solid rgba(217, 119, 6, 0.8); border-left-color: transparent; border-right-color: transparent; animation-duration: 4s; animation-direction: reverse; }
        .orbit-ring.r3 { width: 210px; height: 210px; border: 1px dotted rgba(255, 255, 255, 0.4); border-top: 3px solid var(--accent-gold); animation-duration: 10s; }
        @keyframes corePulse { 0% { transform: scale(0.9); opacity: 0.8; } 100% { transform: scale(1.1); opacity: 1; filter: brightness(1.2); } }
        @keyframes spinRing { 100% { transform: rotate(360deg); } }

        .login-right { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px; background-color: var(--bg-cream); }
        @media (max-width: 900px) { .login-wrapper { flex-direction: column; } .login-left { padding: 60px 20px; } }

        /* --- Dashboard Header --- */
        .header-full {
            background: linear-gradient(135deg, var(--primary-maroon), var(--primary-light));
            width: 100%; padding: 20px 4%; color: var(--text-light); box-shadow: 0 10px 30px rgba(127, 29, 29, 0.15);
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; position: relative; z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        .app-title { font-size: 28px; font-weight: 700; color: var(--accent-gold); letter-spacing: 1px; display: flex; align-items: center; gap: 10px; text-shadow: 0 0 10px rgba(217,119,6,0.3); }
        
        .house-bulb-anim { position: relative; width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; }
        .house-bulb-anim .fa-house { font-size: 35px; color: rgba(255, 255, 255, 0.15); position: absolute; }
        .house-bulb-anim .fa-lightbulb { font-size: 16px; color: var(--accent-gold); position: absolute; top: 15px; animation: bulbFlicker 3s infinite; }
        @keyframes bulbFlicker { 0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--accent-gold), 0 0 20px var(--accent-gold); } 50% { opacity: 0.3; text-shadow: none; } 55% { opacity: 0.9; text-shadow: 0 0 10px var(--accent-gold); } 60% { opacity: 0.3; text-shadow: none; } 80% { opacity: 1; text-shadow: 0 0 15px var(--accent-gold); } }

        .header-center { display: flex; justify-content: center; gap: 25px; padding: 0 20px; }
        .app-icon { font-size: 24px; color: rgba(255, 255, 255, 0.4); animation: iconGlowWave 3s infinite; transition: 0.3s; }
        .app-icon:nth-child(1) { animation-delay: 0.0s; } .app-icon:nth-child(2) { animation-delay: 0.2s; }
        .app-icon:nth-child(3) { animation-delay: 0.4s; } .app-icon:nth-child(4) { animation-delay: 0.6s; }
        .app-icon:nth-child(5) { animation-delay: 0.8s; } .app-icon:nth-child(6) { animation-delay: 1.0s; }
        @keyframes iconGlowWave { 0%, 100% { color: rgba(255, 255, 255, 0.4); transform: translateY(0); } 50% { color: var(--accent-gold); transform: translateY(-4px); filter: drop-shadow(0 0 8px rgba(217,119,6,0.6)); } }

        .header-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
        .greeting { font-size: 16px; font-weight: 500; opacity: 0.9; margin-bottom: 12px; }
        
        /* Modern Premium Digital Clock */
        .digital-clock-wrapper {
            background: rgba(20, 5, 5, 0.85);
            backdrop-filter: blur(10px);
            padding: 8px 22px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2), inset 0 2px 5px rgba(255,255,255,0.05);
            border: 1px solid rgba(217, 119, 6, 0.3);
            transition: all 0.3s ease;
        }
        .digital-clock-wrapper:hover {
            border-color: rgba(217, 119, 6, 0.8);
            box-shadow: 0 8px 20px rgba(217, 119, 6, 0.15), inset 0 2px 5px rgba(255,255,255,0.1);
        }
        .clock-dot {
            width: 8px; height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            animation: blink 1.5s infinite ease-in-out;
            box-shadow: 0 0 10px #10b981;
        }
        .digital-clock {
            font-family: 'Share Tech Mono', monospace; 
            font-size: 24px; 
            color: #fefce8; 
            letter-spacing: 2px; 
            margin-top: 2px;
        }
        .digital-clock span.ampm {
            font-size: 14px;
            color: var(--accent-gold);
            margin-left: 5px;
            font-weight: 600;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
        }

        @media (max-width: 900px) { .header-full { grid-template-columns: 1fr; text-align: center; gap: 20px; } .header-left, .header-center, .header-right { justify-content: center; align-items: center; } }

        /* --- Main Content Grid --- */
        .main-content-wrapper { width: 100%; max-width: 1400px; margin: 0 auto; padding: 40px 5%; flex-grow: 1; display: flex; flex-direction: column; }
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        @media (max-width: 900px) { .grid-layout { grid-template-columns: 1fr; gap: 30px; } }

        /* --- Cards --- */
        .card { background-color: var(--card-white); border-radius: 20px; padding: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); border: 1px solid rgba(217, 119, 6, 0.2); width: 100%; }
        .card-maroon { background: linear-gradient(135deg, var(--primary-maroon), #591111); color: white; border: none; box-shadow: 0 15px 35px rgba(127, 29, 29, 0.25); }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 25px; color: var(--primary-maroon); display: flex; align-items: center; gap: 10px; }
        .card-maroon .card-title { color: #fef3c7; }

        /* Summary Area */
        .summary-grid { display: flex; justify-content: space-between; position: relative; text-align: center; }
        .summary-grid::after { content: ''; position: absolute; left: 50%; top: 5%; bottom: 5%; width: 1px; background-color: rgba(255,255,255,0.2); }
        .summary-col { flex: 1; }
        .summary-label { font-size: 14px; color: #d1d5db; margin-bottom: 5px; }
        .summary-value { font-size: 45px; font-weight: 700; line-height: 1; }
        .val-cost { color: #fcd34d; }
        .currency { font-size: 20px; font-weight: 400; }

        /* Inputs & Buttons */
        .form-group { margin-bottom: 25px; }
        .form-group label { font-size: 15px; font-weight: 600; color: var(--text-dark); display: block; margin-bottom: 10px;}
        input { width: 100%; padding: 18px 20px; background-color: #f9fafb; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 18px; outline: none; transition: all 0.3s; }
        input:focus { border-color: var(--primary-maroon); background-color: #fff; box-shadow: 0 0 0 4px rgba(127, 29, 29, 0.1); }
        
        button.btn-primary { width: 100%; padding: 18px; background-color: var(--primary-maroon); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s; box-shadow: 0 8px 25px rgba(127, 29, 29, 0.25); display: flex; justify-content: center; align-items: center; gap: 10px; }
        button.btn-primary:hover { background-color: var(--primary-light); transform: translateY(-3px); }

        /* Accordions */
        .accordion { background-color: var(--card-white); border: 1px solid rgba(217, 119, 6, 0.2); border-radius: 15px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .accordion-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 600; font-size: 16px; background-color: #fff; transition: background 0.3s; }
        .accordion-header:hover { background-color: #fafaf9; }
        .accordion.open .accordion-header i.fa-chevron-down { transform: rotate(180deg); color: var(--primary-maroon); }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.6s ease-out; background-color: var(--card-white); }
        .accordion.open .accordion-content { max-height: 2000px; }
        .content-inner { padding: 0 20px 20px 20px; font-size: 15px; }

        /* Cumulative History Styling */
        .history-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid rgba(127, 29, 29, 0.1); align-items: center; background: #fff; margin-top: 10px; border-radius: 8px; border-left: 4px solid transparent; transition: 0.3s;}
        .history-item:hover { border-left: 4px solid var(--primary-maroon); background: #fafaf9; }
        .h-date { font-weight: 500; font-size: 14px; color: var(--text-dark); }
        .h-time { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: #6b7280; margin-top: 4px;}
        .h-reading { font-size: 13px; color: #4b5563; margin-top: 5px; font-weight: 600; }
        .h-reading span { color: #000; font-family: 'Share Tech Mono', monospace; font-size: 14px; background: #f3f4f6; padding: 2px 6px; border-radius: 4px;}
        .h-added { font-size: 13px; color: var(--accent-gold); font-weight: 600; margin-top: 4px; }
        .h-units { font-weight: 700; color: var(--primary-maroon); font-size: 18px;}
        .h-cost { font-weight: 700; color: #047857; font-size: 18px;}
        
        .history-initial { border-left: 4px solid var(--accent-gold); background: rgba(217, 119, 6, 0.05); }
        .tariff-item { padding: 10px 0; border-bottom: 1px dashed rgba(0,0,0,0.1); font-size: 14px; padding-left: 10px;}
        .tariff-item strong { color: var(--text-dark); width: 80px; display: inline-block; }

        /* --- Danger Zone --- */
        .danger-zone { margin-top: 50px; padding: 35px; background-color: var(--danger-bg); border: 2px dashed var(--danger-color); border-radius: 15px; text-align: center; width: 100%; position: relative; z-index: 2;}
        .warning-anim i { font-size: 45px; color: var(--danger-color); animation: warningPulse 1s infinite alternate; }
        @keyframes warningPulse { 0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(239,68,68,0.5));} 100% { transform: scale(1.1); filter: drop-shadow(0 0 15px rgba(239,68,68,0.9));} }
        .danger-zone p { font-size: 16px; color: var(--danger-color); margin: 15px 0; font-weight: 500; }
        button.btn-danger { padding: 15px 35px; background-color: var(--danger-color); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3); display: inline-flex; align-items: center; gap: 10px; }
        button.btn-danger:hover { background-color: #dc2626; transform: translateY(-3px); }

        /* --- Custom Smart Popup Modal --- */
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 10000; opacity: 0; transition: opacity 0.3s ease; }
        .popup-overlay.show { display: flex; opacity: 1; }
        .popup-box { background-color: #fff; padding: 40px; border-radius: 20px; text-align: center; max-width: 420px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.3); transform: scale(0.8); transition: transform 0.3s ease; border-top: 6px solid var(--accent-gold); }
        .popup-overlay.show .popup-box { transform: scale(1); }
        .popup-icon { font-size: 55px; color: var(--accent-gold); margin-bottom: 20px; animation: bounceIn 0.6s; }
        @keyframes bounceIn { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .popup-title { font-size: 22px; font-weight: 700; color: var(--primary-maroon); margin-bottom: 15px; }
        .popup-text { font-size: 15px; color: #4b5563; line-height: 1.6; margin-bottom: 25px; }
        .popup-time { font-family: 'Share Tech Mono', monospace; font-weight: 700; color: var(--primary-maroon); font-size: 18px; padding: 5px 12px; background: rgba(127,29,29,0.1); border-radius: 8px;}
        .btn-ok { background-color: var(--primary-maroon); color: white; border: none; padding: 12px 35px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        .btn-ok:hover { background-color: var(--primary-light); }

        /* --- Footer --- */
        .app-footer { background-color: var(--primary-maroon); color: white; width: 100%; padding: 25px 20px; text-align: center; margin-top: auto; box-shadow: 0 -10px 20px rgba(0,0,0,0.15); position: relative; z-index: 10; border-top: 2px solid rgba(217, 119, 6, 0.2); }
        .creator-text { font-size: 15px; font-weight: 500; letter-spacing: 0.5px; color: rgba(255,255,255,0.9); }
        .fb-link { display: inline-flex; align-items: center; gap: 8px; margin-top: 8px; color: var(--accent-gold); text-decoration: none; font-weight: 600; font-size: 15px; transition: opacity 0.3s; }
        .fb-link:hover { opacity: 0.8; text-shadow: 0 0 8px var(--accent-gold); }
    </style>
</head>
<body>

    <div class="bg-animations">
        <i class="fa-solid fa-bolt bg-anim-item"></i>
        <i class="fa-solid fa-plug bg-anim-item"></i>
        <i class="fa-solid fa-lightbulb bg-anim-item"></i>
        <i class="fa-solid fa-plug-circle-bolt bg-anim-item"></i>
        <i class="fa-solid fa-bolt bg-anim-item"></i>
    </div>

    <div id="customPopup" class="popup-overlay">
        <div class="popup-box">
            <i class="fa-solid fa-circle-check popup-icon"></i>
            <div class="popup-title">දත්ත සටහන් විය!</div>
            <div class="popup-text">
                ඔබගේ මීටර කියවීම සාර්ථකව <span class="popup-time" id="popupTimeText">--:--</span> ට සටහන් කරගත්තා.<br><br>
                නිවැරදි දෛනික ගණනයක් පවත්වා ගැනීමට හෙට දිනයේදීත් ආසන්න වශයෙන් මෙම වෙලාවටම මීටර කියවීම ඇතුළත් කරන්න.
            </div>
            <button class="btn-ok" onclick="closePopup()">හරි, තේරුණා</button>
        </div>
    </div>

    <div id="loadingOverlay">
        <div class="cyber-core" style="width:100px; height:100
