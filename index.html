<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home E-Cal | Premium Electricity Tracker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+Sinhala:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <style>
        /* Full-Screen Premium Theme */
        :root {
            --bg-cream: #fdf6e9; /* Cream Background */
            --card-white: #ffffff;
            --primary-maroon: #7f1d1d; /* Deep Red/Maroon */
            --primary-light: #991b1b;
            --accent-gold: #d97706;
            --text-dark: #27272a;
            --text-light: #fefce8;
            --danger-color: #ef4444;
            --danger-bg: #fef2f2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            min-height: 100vh;
            font-family: 'Poppins', 'Noto Sans Sinhala', sans-serif;
            background-color: var(--bg-cream);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #faecd4 0%, transparent 80%);
        }

        .app-container {
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        /* --- Full Screen Header --- */
        .header-full {
            background: linear-gradient(135deg, var(--primary-maroon), var(--primary-light));
            width: 100%;
            padding: 20px 5%;
            color: var(--text-light);
            box-shadow: 0 10px 30px rgba(127, 29, 29, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            position: relative;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Custom House & Bulb Animation */
        .house-bulb-anim {
            position: relative;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .house-bulb-anim .fa-house {
            font-size: 35px;
            color: rgba(255, 255, 255, 0.2);
            position: absolute;
        }

        .house-bulb-anim .fa-lightbulb {
            font-size: 18px;
            color: var(--accent-gold);
            position: absolute;
            top: 18px;
            animation: bulbFlicker 3s infinite;
        }

        @keyframes bulbFlicker {
            0%, 100% { opacity: 1; text-shadow: 0 0 15px var(--accent-gold), 0 0 30px var(--accent-gold); }
            50% { opacity: 0.3; text-shadow: none; }
            55% { opacity: 0.8; text-shadow: 0 0 10px var(--accent-gold); }
            60% { opacity: 0.3; text-shadow: none; }
            80% { opacity: 1; text-shadow: 0 0 20px var(--accent-gold); }
        }

        .app-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-gold);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-right { text-align: right; }
        .greeting { font-size: 20px; font-weight: 600; }

        .clock-display {
            font-size: 16px;
            color: #fcd34d;
            font-family: monospace;
            background: rgba(0,0,0,0.25);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 5px;
        }

        /* --- Full Width Grid Layout --- */
        .main-content-wrapper {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 5%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        @media (max-width: 900px) {
            .grid-layout { grid-template-columns: 1fr; gap: 20px; }
            .header-full { flex-direction: column; text-align: center; justify-content: center; }
            .header-right { text-align: center; }
        }

        /* --- Cards --- */
        .card {
            background-color: var(--card-white);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            border: 1px solid rgba(217, 119, 6, 0.2);
        }

        .card-maroon {
            background: linear-gradient(135deg, var(--primary-maroon), #651616);
            color: white;
            border: none;
            box-shadow: 0 15px 35px rgba(127, 29, 29, 0.2);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--primary-maroon);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-maroon .card-title { color: #fef3c7; }

        /* Summary Area */
        .summary-grid {
            display: flex;
            justify-content: space-between;
            position: relative;
            text-align: center;
        }

        .summary-grid::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background-color: rgba(255,255,255,0.2);
        }

        .summary-col { flex: 1; }
        .summary-label { font-size: 14px; color: #d1d5db; margin-bottom: 5px; }
        .summary-value { font-size: 45px; font-weight: 700; line-height: 1; }
        .currency { font-size: 20px; font-weight: 400; }

        /* Inputs & Buttons */
        .form-group { margin-bottom: 20px; }
        .form-group label { font-size: 15px; font-weight: 600; color: var(--text-dark); display: block; margin-bottom: 10px;}

        input {
            width: 100%;
            padding: 18px 20px;
            background-color: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-family: inherit;
            font-size: 18px;
            color: var(--text-dark);
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary-maroon);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(127, 29, 29, 0.1);
        }

        button.btn-primary {
            width: 100%;
            padding: 18px;
            background-color: var(--primary-maroon);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(127, 29, 29, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button.btn-primary:hover { background-color: var(--primary-light); transform: translateY(-2px); }

        /* Accordion / History */
        .accordion {
            background-color: var(--card-white);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .accordion-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            color: var(--text-dark);
            background-color: #fff;
            transition: background 0.3s;
        }

        .accordion-header:hover { background-color: #fafaf9; }
        .accordion.open .accordion-header i.fa-chevron-down { transform: rotate(180deg); color: var(--primary-maroon); }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out;
            background-color: var(--card-white);
        }
        
        .accordion.open .accordion-content { max-height: 1000px; }
        .content-inner { padding: 0 20px 20px 20px; font-size: 15px; }

            display: flex;
            justify-content: space-between;
